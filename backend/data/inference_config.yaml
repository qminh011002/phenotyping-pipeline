larvae:
  input_folders:
  - C:/path/to/GxE Images/Batch 1
  - C:/path/to/GxE Images/Batch 2
  - C:/path/to/GxE Images/Batch 3
  - C:/path/to/GxE Images/Batch 4
  - C:/path/to/GxE Images/Batch 5
  model: models/larvae_best.pt
  tile_size: 512
  overlap: 0.4
  confidence_threshold: 0.3
